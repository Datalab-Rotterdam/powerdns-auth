name: publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "pdns.conf.tpl"
      - "README.md"
      - "docker-compose.yml"
      - "docker-compose.sqlite.yml"
      - "docker-compose.mysql.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  prepare:
    uses: ./.github/workflows/reusable-prepare.yml
    secrets: inherit

  smoke:
    needs: prepare
    if: github.event_name != 'schedule' || needs.prepare.outputs.version_exists != 'true'
    uses: ./.github/workflows/reusable-smoke.yml
    with:
      image_version: ${{ needs.prepare.outputs.pdns_version }}
      image_repository: https://github.com/${{ github.repository }}
      subvars_version: ${{ needs.prepare.outputs.subvars_version }}
      subvars_sha256_amd64: ${{ needs.prepare.outputs.subvars_sha256_amd64 }}
      subvars_sha256_arm64: ${{ needs.prepare.outputs.subvars_sha256_arm64 }}

  publish:
    needs:
      - prepare
      - smoke
    if: github.event_name != 'schedule' || needs.prepare.outputs.version_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare.outputs.pdns_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_VERSION=${{ needs.prepare.outputs.pdns_version }}
            IMAGE_REPOSITORY=https://github.com/${{ github.repository }}
            SUBVARS_VERSION=${{ needs.prepare.outputs.subvars_version }}
            SUBVARS_SHA256_AMD64=${{ needs.prepare.outputs.subvars_sha256_amd64 }}
            SUBVARS_SHA256_ARM64=${{ needs.prepare.outputs.subvars_sha256_arm64 }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ needs.prepare.outputs.repository }}
