name: publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "pdns.conf.tpl"
      - "README.md"
      - "docker-compose.yml"
      - "docker-compose.sqlite.yml"
      - "docker-compose.mysql.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect PowerDNS auth version
        id: pdns
        run: |
          version=$(
            docker run --rm debian:trixie-slim sh -ec "
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl >/dev/null
              install -d /etc/apt/keyrings
              curl -fsSL https://repo.powerdns.com/FD380FBB-pub.asc -o /etc/apt/keyrings/auth-50-pub.asc
              codename=\$(. /etc/os-release && printf '%s' \"\$VERSION_CODENAME\")
              arch=\$(dpkg --print-architecture)
              echo \"deb [arch=\${arch} signed-by=/etc/apt/keyrings/auth-50-pub.asc] https://repo.powerdns.com/debian \${codename}-auth-50 main\" > /etc/apt/sources.list.d/pdns.list
              printf 'Package: pdns-*\\nPin: origin repo.powerdns.com\\nPin-Priority: 600\\n' > /etc/apt/preferences.d/auth-50
              apt-get update >/dev/null
              apt-cache policy pdns-server | awk '/Candidate:/ { print \$2; exit }' | cut -d- -f1
            "
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check published Docker Hub tags
        id: published
        run: |
          if docker manifest inspect "dl010/powerdns-auth:${{ steps.pdns.outputs.version }}" >/dev/null 2>&1; then
            echo "version_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        if: github.event_name != 'schedule' || steps.published.outputs.version_exists != 'true'
        uses: docker/metadata-action@v5
        with:
          images: dl010/powerdns-auth
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.pdns.outputs.version }}

      - name: Build and push
        if: github.event_name != 'schedule' || steps.published.outputs.version_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Docker Hub description
        if: github.event_name != 'schedule' || steps.published.outputs.version_exists != 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: dl010/powerdns-auth
